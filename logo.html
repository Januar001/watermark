<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Watermark Generator</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f4f8;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 30px;
            font-size: 2.2em;
            color: #2c3e50;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px auto;
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .settings-card {
            width: 100%;
            margin-bottom: 25px;
            text-align: left;
            padding: 20px;
            background: #f8fafc;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        .settings-card h3 {
            margin-top: 0;
            font-size: 1.2em;
            color: #2c3e50;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 5px;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .radio-group label {
            cursor: pointer;
            font-weight: bold;
            color: #34495e;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #3498db;
        }

        .upload-group {
            margin-top: 10px;
        }

        /* Custom File Input Styling */
        input[type="file"] {
            display: none;
        }

        .btn {
            background-color: #3498db;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-size: 1.1em;
            border: none;
            display: inline-block;
            font-family: inherit;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: #95a5a6;
            padding: 8px 20px;
            font-size: 0.9em;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        #downloadAll {
            margin-top: 20px;
            background-color: #27ae60;
            display: none;
            width: 100%;
        }

        #downloadAll:hover {
            background-color: #2ecc71;
        }

        #logoPreview img {
            max-height: 60px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px dashed #bdc3c7;
            padding: 5px;
            background: white;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 20px;
        }

        .image-container {
            position: relative;
            display: inline-block;
            width: 200px;
            height: 150px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background-color: white;
            transition: transform 0.3s ease;
        }

        .image-container:hover {
            transform: scale(1.05);
        }

        .image-container img.main-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Canvas thumbnail styling */
        .image-container canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Hilangkan CSS overlay lama karena kita akan pakai live canvas */
    </style>
</head>
<body>

    <h1>Mass Watermark Generator</h1>

    <div class="container">
        <!-- Pengaturan Watermark -->
        <div class="settings-card">
            <h3>Pengaturan Watermark</h3>
            
            <div class="radio-group">
                <label><input type="radio" name="wmType" value="text" checked> Teks</label>
                <label><input type="radio" name="wmType" value="logo"> Logo/Gambar</label>
            </div>

            <!-- Input Teks -->
            <div id="textSettings">
                <input type="text" id="watermarkText" value="Follow instagram kami di @asteria.digitama" placeholder="Masukkan teks watermark di sini...">
            </div>

            <!-- Input Logo -->
            <div id="logoSettings" style="display: none;">
                <label for="logoUpload" class="btn btn-secondary">Pilih Logo Watermark</label>
                <input type="file" id="logoUpload" accept="image/*">
                <div id="logoPreview"></div>
            </div>

            <!-- Tambahan: Posisi & Repeat -->
            <div class="setting-group" id="positionGroup" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #e2e8f0;">
                <label for="wmPosition" style="font-weight:bold; color:#34495e; display:block; margin-bottom:8px;">Posisi Watermark:</label>
                <select id="wmPosition" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; font-size: 1em;">
                    <option value="center">Tengah</option>
                    <option value="top-left">Kiri Atas</option>
                    <option value="top-right">Kanan Atas</option>
                    <option value="bottom-left">Kiri Bawah</option>
                    <option value="bottom-right">Kanan Bawah</option>
                </select>
            </div>
            
            <div class="setting-group checkbox-group" style="margin-top: 15px;">
                <label style="cursor: pointer; font-weight: bold; color: #34495e; display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="wmRepeat" style="width: 18px; height: 18px;"> Ulangi (Tile) Watermark ke Seluruh Gambar
                </label>
            </div>
        </div>

        <!-- Area Upload Gambar Target -->
        <div class="uploader">
            <label for="imageUpload" class="btn">Pilih Gambar Target (Bisa Lebih Dari 1)</label>
            <input type="file" id="imageUpload" multiple accept="image/*">
        </div>

        <button id="downloadAll" class="btn">⬇ Download Semua (ZIP)</button>
    </div>

    <!-- Gallery Preview -->
    <div class="gallery" id="gallery"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        // DOM Elements
        const radios = document.querySelectorAll('input[name="wmType"]');
        const textSettings = document.getElementById('textSettings');
        const logoSettings = document.getElementById('logoSettings');
        const watermarkText = document.getElementById('watermarkText');
        const logoUpload = document.getElementById('logoUpload');
        const logoPreview = document.getElementById('logoPreview');
        const imageUpload = document.getElementById('imageUpload');
        const gallery = document.getElementById('gallery');
        const downloadAllButton = document.getElementById('downloadAll');
        
        // New DOM Elements
        const wmPosition = document.getElementById('wmPosition');
        const wmRepeat = document.getElementById('wmRepeat');
        const positionGroup = document.getElementById('positionGroup');

        // State variables
        let currentMode = 'text';
        let customLogoImage = null;
        let selectedImages = []; // Menyimpan gambar yang sudah diupload untuk live preview

        // Toggle UI Teks vs Logo
        radios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentMode = e.target.value;
                if (currentMode === 'text') {
                    textSettings.style.display = 'block';
                    logoSettings.style.display = 'none';
                } else {
                    textSettings.style.display = 'none';
                    logoSettings.style.display = 'block';
                }
                renderGallery(); // Update live preview
            });
        });

        // Trigger Live Preview saat setting berubah
        [wmPosition, wmRepeat, watermarkText].forEach(el => {
            el.addEventListener('input', renderGallery);
            el.addEventListener('change', renderGallery);
        });

        // Toggle dropdown posisi jika repeat aktif
        wmRepeat.addEventListener('change', (e) => {
            wmPosition.disabled = e.target.checked;
            positionGroup.style.opacity = e.target.checked ? '0.5' : '1';
        });

        // Handle Logo Upload
        logoUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    customLogoImage = new Image();
                    customLogoImage.src = event.target.result;
                    
                    customLogoImage.onload = function() {
                        logoPreview.innerHTML = '';
                        const imgPreview = document.createElement('img');
                        imgPreview.src = event.target.result;
                        logoPreview.appendChild(imgPreview);
                        renderGallery(); // Update live preview
                    };
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle Main Images Upload
        imageUpload.addEventListener('change', function(e) {
            const files = e.target.files;
            if(files.length === 0) return;

            selectedImages = []; // Reset batch
            let loadedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();

                reader.onload = function (event) {
                    const img = new Image();
                    img.onload = function () {
                        selectedImages.push({ file: file, img: img });
                        loadedCount++;
                        if (loadedCount === files.length) {
                            renderGallery(); // Render semua thumbnail setelah semua selesai dimuat
                        }
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Render Thumbnail Preview (Live update)
        function renderGallery() {
            gallery.innerHTML = ''; 

            if (selectedImages.length === 0) {
                downloadAllButton.style.display = 'none';
                return;
            }

            if (currentMode === 'logo' && !customLogoImage) {
                gallery.innerHTML = '<p style="color: #e74c3c; font-weight: bold;">Harap upload logo watermark terlebih dahulu.</p>';
                downloadAllButton.style.display = 'none';
                return;
            }

            downloadAllButton.style.display = 'block';

            selectedImages.forEach(item => {
                const container = document.createElement('div');
                container.classList.add('image-container');

                const canvas = document.createElement('canvas');
                // Set ukuran canvas kecil khusus preview agar tidak lag
                const maxThumbWidth = 300; 
                const ratio = item.img.width / item.img.height;
                
                if (item.img.width > item.img.height) {
                    canvas.width = maxThumbWidth;
                    canvas.height = maxThumbWidth / ratio;
                } else {
                    canvas.height = maxThumbWidth;
                    canvas.width = maxThumbWidth * ratio;
                }

                const ctx = canvas.getContext('2d');
                drawWatermark(ctx, item.img, canvas.width, canvas.height);
                
                container.appendChild(canvas);
                gallery.appendChild(container);
            });
        }

        // Inti Fungsi Gambar (Dipakai untuk Preview dan Export Full Size)
        function drawWatermark(ctx, baseImg, canvasWidth, canvasHeight) {
            ctx.drawImage(baseImg, 0, 0, canvasWidth, canvasHeight);

            const isRepeat = wmRepeat.checked;
            const pos = wmPosition.value;
            const pad = Math.min(canvasWidth, canvasHeight) * 0.05; // 5% padding dari tepi

            if (currentMode === 'text') {
                const wmText = watermarkText.value || 'Watermark';
                const fontSize = Math.min(canvasWidth, canvasHeight) * 0.05; 
                
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)'; 
                ctx.shadowColor = 'rgba(0, 0, 0, 0.8)';
                ctx.shadowBlur = Math.max(3, fontSize * 0.1);

                if (isRepeat) {
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const textMetrics = ctx.measureText(wmText);
                    const stepX = textMetrics.width + (canvasWidth * 0.1);
                    const stepY = fontSize * 3;

                    ctx.save();
                    // Rotasi kanvas ke tengah untuk efek diagonal
                    ctx.translate(canvasWidth/2, canvasHeight/2);
                    ctx.rotate(-Math.PI / 6); // -30 Derajat
                    ctx.translate(-canvasWidth/2, -canvasHeight/2);

                    const startX = -canvasWidth;
                    const endX = canvasWidth * 2;
                    const startY = -canvasHeight;
                    const endY = canvasHeight * 2;

                    for (let x = startX; x < endX; x += stepX) {
                        for (let y = startY; y < endY; y += stepY) {
                            ctx.fillText(wmText, x, y);
                        }
                    }
                    ctx.restore();
                } else {
                    let x, y;
                    if (pos === 'center') { x = canvasWidth/2; y = canvasHeight/2; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; }
                    else if (pos === 'top-left') { x = pad; y = pad; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; }
                    else if (pos === 'top-right') { x = canvasWidth - pad; y = pad; ctx.textAlign = 'right'; ctx.textBaseline = 'top'; }
                    else if (pos === 'bottom-left') { x = pad; y = canvasHeight - pad; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; }
                    else if (pos === 'bottom-right') { x = canvasWidth - pad; y = canvasHeight - pad; ctx.textAlign = 'right'; ctx.textBaseline = 'bottom'; }

                    ctx.fillText(wmText, x, y);
                }

            } else if (currentMode === 'logo') {
                const logoRatio = customLogoImage.width / customLogoImage.height;
                const logoWidth = canvasWidth * 0.25; // Default ukuran logo 25% dari gambar
                const logoHeight = logoWidth / logoRatio;

                ctx.globalAlpha = 0.6; // Transparansi logo

                if (isRepeat) {
                    const stepX = logoWidth * 1.5;
                    const stepY = logoHeight * 1.5;

                    ctx.save();
                    ctx.translate(canvasWidth/2, canvasHeight/2);
                    ctx.rotate(-Math.PI / 6);
                    ctx.translate(-canvasWidth/2, -canvasHeight/2);

                    const startX = -canvasWidth;
                    const endX = canvasWidth * 2;
                    const startY = -canvasHeight;
                    const endY = canvasHeight * 2;

                    for (let x = startX; x < endX; x += stepX) {
                        for (let y = startY; y < endY; y += stepY) {
                            ctx.drawImage(customLogoImage, x, y, logoWidth, logoHeight);
                        }
                    }
                    ctx.restore();
                } else {
                    let lx, ly;
                    if (pos === 'center') { lx = (canvasWidth - logoWidth)/2; ly = (canvasHeight - logoHeight)/2; }
                    else if (pos === 'top-left') { lx = pad; ly = pad; }
                    else if (pos === 'top-right') { lx = canvasWidth - logoWidth - pad; ly = pad; }
                    else if (pos === 'bottom-left') { lx = pad; ly = canvasHeight - logoHeight - pad; }
                    else if (pos === 'bottom-right') { lx = canvasWidth - logoWidth - pad; ly = canvasHeight - logoHeight - pad; }

                    ctx.drawImage(customLogoImage, lx, ly, logoWidth, logoHeight);
                }
                ctx.globalAlpha = 1.0;
            }
        }

        // Setup tombol download ZIP
        downloadAllButton.onclick = function () {
            if(selectedImages.length === 0) return;

            downloadAllButton.innerText = "Memproses ZIP...";
            downloadAllButton.style.backgroundColor = "#e67e22";
            
            const zip = new JSZip();
            let processedCount = 0;

            selectedImages.forEach(item => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // Gunakan dimensi ASLI gambar untuk export akhir
                canvas.width = item.img.naturalWidth;
                canvas.height = item.img.naturalHeight;

                drawWatermark(ctx, item.img, canvas.width, canvas.height);

                canvas.toBlob(function(blob) {
                    zip.file(item.file.name, blob);
                    processedCount++;

                    if(processedCount === selectedImages.length) {
                        zip.generateAsync({ type: 'blob' }).then(function (content) {
                            saveAs(content, 'watermarked_images.zip');
                            downloadAllButton.innerText = "⬇ Download Semua (ZIP)";
                            downloadAllButton.style.backgroundColor = "#27ae60";
                        });
                    }
                }, 'image/jpeg', 0.90);
            });
        };
    </script>
</body>
</html>
